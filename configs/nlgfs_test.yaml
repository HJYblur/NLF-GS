# Inference / test config (single subject, 4 views). Same section order as training configs + inference.
# Default layout matches training `processed/` but under `data/processed_test/<subject>/`.

# --- Runtime / process ---
sys:
  device: cuda
  matmul_precision: medium
  debug: False

# --- Dataset & resolution ---
data:
  raw: data
  root: processed_test
  smplx_root: data/THuman_2.0_smplx_paras
  num_views: 4
  image_size: [1024, 1024]

# --- Canonical cameras ---
camera:
  distance: 1.5
  yfov_deg: 45.0
  up: [0.0, 1.0, 0.0]
  viewpoints:
    front: [0.0, 0.0, 1.0]
    back: [0.0, 0.0, -1.0]
    left: [-1.0, 0.0, 0.0]
    right: [1.0, 0.0, 0.0]

# --- Perception stack ---
backbone:
  fpn_levels: ["p2", "p3", "p4"]
  fpn_out_channels: 256
  local_feature_dim: 768
  resnet50_weights_path: models/torchvision/resnet50-0676ba61.pth

fusion:
  mode: learned
  hidden_dim: 256

avatar_template:
  mode: default # default | generate | test | anim
  path: models/avatar_template.ply
  cano_mesh_path: models/smplx/smplx_uv.obj
  anim_mesh_path: tmp/output_smplx_mesh.ply
  k_num_gaussians: 4
  barycentric_coords:
    - [0.6, 0.2, 0.2]
    - [0.2, 0.6, 0.2]
    - [0.2, 0.2, 0.6]
    - [0.3333333333, 0.3333333333, 0.3333333333]

decoder:
  in_dim: 768
  hidden: 256
  sh_degree: 1
  out_dim: 23
  scale_min: 1.0e-6
  scale_max: 4.0e-3
  alpha_min: 0.0
  alpha_max: 1.0
  rot_min: -1.0
  rot_max: 1.0
  sh_min: -1.0
  sh_max: 1.0
  offset_scale: 0.01

# --- Training-style keys (minimal for scripts that share loaders / loss defaults) ---
train:
  accelerator: cuda
  precision: 16-mixed
  batch_size: 4
  num_workers: 0
  epochs: 1
  val_ratio: 0.0
  train_decoder_only: false
  test_renders: [] # WandB RGB: subject IDs, [-1] for all, or [] to disable

render:
  save_path: output
  log_online: false

# --- Inference-only (checkpoint, outputs, PLY options) ---
inference:
  # Default checkpoint (repo-root relative when running from avatar-benchmark/)
  checkpoint: models/checkpoints/z6pwnr64-epoch=49-step=19100.ckpt
  # subject_params: smplx_root/<subject>/smplx_param.pkl or mesh_smplx.obj
  # canonical_mesh: vertices from avatar_template.cano_mesh_path (same topology as avatar_template.path)
  smplx_source: subject_params
  output_dir: output
  # If false, only ``<subject>.pt`` is written (plus optional ``save_test_ply`` bundles).
  save_reconstruction: true
  reconstruction_subdir: reconstruction
  # PNG basenames: ``{reconstruction_save_prefix}_{view}.png`` (default prefix ``reconstructed``).
  # PLY: ``reconstructed_{subject}.ply`` unless ``reconstruction_ply_filename`` is set.
  # ``save_test_ply``: ``<subject>_view.pt`` / ``.pkl`` (log scales, no offset).
  save_test_ply: false

# ``anim.py``: SMPL pose and stills vs self-spin video.
animation:
  pose: reconstruction # reconstruction | tpose | custom
  custom_pose_path: data/anim/custom_pose.pkl
  display_mode: video # image (4 views → reconstruction_subdir) | video (anim_video/*.mp4)
  reconstruction_subdir: reconstruction
  fps: 30
  duration_seconds: 2
  video_subdir: anim_video

# --- Metrics (evaluation) ---
metrics:
  lpips_cache_dir: models/lpips