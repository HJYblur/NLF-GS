sys:
  device: cuda # 'cpu', 'cuda', 'cuda:0', etc.
  matmul_precision: medium  # 'high', 'medium', 'low'
  debug: False

data:
  raw: data
  root: processed
  smplx_root: data/THuman_2.0_smplx_paras
  num_views: 4
  template_path: models/avatar_template.ply
  image_size: [512, 512]  # [W, H]
  augmentation:
    enabled: True
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    gamma: 0.08
    noise_std: 0.01
    blur_prob: 0.2
    jpeg_prob: 0.2
    jpeg_quality_min: 75
    jpeg_quality_max: 95
    save_preview: True
    save_once_per_subject: True

camera:
  image_size: [512, 512]  # [W, H]
  distance: 1.5          # Camera distance from origin
  yfov_deg: 45.0         # Vertical field of view in degrees
  up: [0.0, 1.0, 0.0]    # Default up vector
  viewpoints:            # Direction vectors for each canonical view
    front: [0.0, 0.0, 1.0]
    back: [0.0, 0.0, -1.0]
    left: [-1.0, 0.0, 0.0]
    right: [1.0, 0.0, 0.0]

nlf:
  checkpoint_path: models/nlf_checkpoint/nlf_l_multi.torchscript
  use_half: True
  latent_dim: 512

identity_encoder:
  latent_dim: 64
  use_flag: False

avatar:
  template:
    mode: default       # options: default | generate | test
    path: models/avatar_template.ply
    cano_mesh_path: models/smplx/smplx_uv.obj
    anim_mesh_path: tmp/output_smplx_mesh.ply
    k_num_gaussians: 4
    barycentric_coords:
      - [0.6, 0.2, 0.2]
      - [0.2, 0.6, 0.2]
      - [0.2, 0.2, 0.6]
      - [0.3333333333, 0.3333333333, 0.3333333333]

decoder:
  in_dim: 512  # local feature dim
  hidden: 256
  sh_degree: 1
  out_dim: 20
  scale_min: 1.0e-6     # sigmoid lower bound for Gaussian scale
  scale_max: 0.01       # sigmoid upper bound for Gaussian scale

train:
  # Base settings
  accelerator: cuda
  precision: 16-mixed          # Use AMP (fp16) to halve VRAM on activations & weights
  batch_size: 4                # Must match num_views (4 views fused per subject)
  num_workers: 2
  epochs: 10
  val_ratio: 0.2

  # Optimizer & scheduler settings
  lr: 0.0001
  weight_decay: 0.0
  betas: [0.9, 0.99]
  eps: 1.0e-8
  warmup_ratio: 0.05  # fraction of total steps used for linear warmup
  scheduler: cosine 

  # Loss weights
  weight_rgb: 1.0
  weight_l1: 0.5
  weight_masked_ssim: 0.2
  weight_perceptual: 0.3
  weight_scale_reg: 0.01
  weight_opacity_reg: 0.05
  weight_multiview_consistency: 0.0
  
  # GPU memory profiling (logs peak VRAM per section)
  profile_gpu: False

render:
  save_path: output
  view_chunk_size: 1
