sys:
  device: cuda # 'cpu', 'cuda', 'cuda:0', etc.
  matmul_precision: medium # 'high', 'medium', 'low'
  debug: False

data:
  raw: data
  root: processed
  smplx_root: data/THuman_2.0_smplx_paras
  num_views: 1
  template_path: models/avatar_template.ply
  image_size: [512, 512] # [W, H]

camera:
  image_size: [512, 512] # [W, H]
  distance: 1.5 # Camera distance from origin
  yfov_deg: 45.0 # Vertical field of view in degrees
  up: [0.0, 1.0, 0.0] # Default up vector
  viewpoints: # Direction vectors for each canonical view
    front: [0.0, 0.0, 1.0]
    back: [0.0, 0.0, -1.0]
    left: [-1.0, 0.0, 0.0]
    right: [1.0, 0.0, 0.0]

nlf:
  checkpoint_path: models/nlf_checkpoint/nlf_l_multi.torchscript
  use_half: True
  latent_dim: 512

backbone:
  use_resnet_fpn: true
  fpn_levels: ["p2", "p3", "p4"]
  fpn_out_channels: 256
  resnet50_weights_path: models/torchvision/resnet50-0676ba61.pth

model:
  local_feature_dim: 768

identity_encoder:
  latent_dim: 64
  use_flag: False

avatar:
  template:
    mode: default # options: default | generate | test
    path: models/avatar_template.ply
    cano_mesh_path: models/smplx/smplx_uv.obj
    anim_mesh_path: tmp/output_smplx_mesh.ply
    k_num_gaussians: 4
    barycentric_coords:
      - [0.6, 0.2, 0.2]
      - [0.2, 0.6, 0.2]
      - [0.2, 0.2, 0.6]
      - [0.3333333333, 0.3333333333, 0.3333333333]

decoder:
  in_dim: 768 # local feature dim
  hidden: 256
  sh_degree: 0
  out_dim: 14
  scale_min: 1.0e-6 # sigmoid lower bound for Gaussian scale
  scale_max: 1.0e-3 # sigmoid upper bound for Gaussian scale
  alpha_min: 0.0 # lower bound for opacity
  alpha_max: 1.0 # upper bound for opacity
  rot_min: -1.0 # pre-normalization lower bound for quaternion components
  rot_max: 1.0 # pre-normalization upper bound for quaternion components
  sh_min: -1.0 # lower bound for SH coefficients
  sh_max: 1.0 # upper bound for SH coefficients
  offset_scale: 0.01 # hard cap factor for local-surface offsets

train:
  # Base settings
  accelerator: cuda
  train_decoder_only: false # true: freeze backbone and train decoder only; false: also train ResNet-FPN
  precision: 16-mixed # Use AMP (fp16) to halve VRAM on activations & weights
  batch_size: 4 # Must match num_views (4 views fused per subject)
  num_workers: 2
  max_steps: 25000 # total training cap; training is step-based
  val_ratio: 0.2

  # Optimizer & scheduler settings
  lr: 0.0001
  bb_lr_mult: 0.1 # backbone lr = lr * bb_lr_mult (try 0.01 if unstable)
  wd: 0.01
  weight_decay: 0.01 # backward-compatible alias for wd
  betas: [0.9, 0.99]
  eps: 1.0e-8
  warmup_ratio: 0.05 # 5-10% warmup is recommended
  min_lr_ratio: 0.05 # cosine floor; keep > 0 to avoid stalling
  scheduler: none
  two_phase:
    phase1_ratio: 0.3 # used when phase1_steps is null
    phase1_steps: null # optional explicit override (e.g. 6000)
    phase2_target_views: 2
    phase2_target_weight_start: 0.3
    phase2_target_weight_end: 0.8
    phase2_curriculum_start: 0.35
    warmup_scale_reg_multiplier: 2.5
    early_phase2_scale_reg_multiplier: 1.5
    phase2_scale_reg_relax_progress: 0.5
    phase2_backbone_lr_mult: 0.1

  # Loss weights
  weight_l1: 1.0
  weight_l2: 0.25
  weight_masked_ssim: 0.1
  weight_perceptual: 0.05
  weight_scale_reg: 0.005
  weight_offset_reg: 0.01
  weight_opacity_reg: 0.01
  weight_silhouette: 0.2 # Silhouette loss: penalizes mismatch between rendered and GT mask
  weight_multiview_consistency: 0.05

  # GPU memory profiling (logs peak VRAM per section)
  profile_gpu: False
  log_train_losses: true
  log_val_losses: true
  tracked_losses: null # null logs all losses; set list like ["loss", "l1"] to filter
  test_renders: [7, 100, 350] # subject IDs whose renders are logged online

analysis:
  dump_local_feats: false # set true to save local_feats and collision_data tensors
  dump_collision_data: true # also write collision_data_<subject>.pt (centers2d + sizes)
  dump_subject: "0007" # subject ID to dump; null means dump every subject
  dump_dir: tmp/analysis # directory where .pt files are written

render:
  save_path: output # kept for backward compatibility; renders are logged online by default
  view_chunk_size: 1
  log_online: true
  log_stages: ["train", "val"]
